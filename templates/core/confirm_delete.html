{% extends "base.html" %}
{% block title %}Confirm Delete — WorkForge{% endblock %}
{% block content %}
<div style="max-width:420px;margin:80px auto;padding:0 24px;">
  <div class="card" style="text-align:center;padding:40px;">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <div style="font-family:var(--font-head);font-size:22px;font-weight:600;margin-bottom:10px;">Delete {{ type|capfirst }}?</div>
    <p class="text-muted" style="margin-bottom:28px;line-height:1.6;">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
    <form method="post" style="display:flex;gap:10px;justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
